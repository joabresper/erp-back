name: CI (Lint, Build, Test & Auto PR)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  validate-app:
    name: Validate, Test and PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Necesario para que el CLI de GitHub tenga contexto del historial
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build

      - name: Run Tests
        run: npm run test

      # NUEVO PASO: Crear PR automática si es una rama de feature y los tests pasaron
      - name: Create Pull Request to Main
        # Solo se ejecuta si los pasos anteriores fueron exitosos 
        # y si NO estamos ya en la rama main o develop
        if: success() && startsWith(github.ref, 'refs/heads/feature/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head ${{ github.ref_name }} \
            --title "feat: merge ${{ github.ref_name }} into main" \
            --body "PR generada automáticamente por el pipeline de CI tras validar Lint, Build y Tests." || echo "La PR ya existe o no se pudo crear."
